<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест — очень сложный | Таймер + Оценка</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
      background: linear-gradient(145deg, #eef4fc 0%, #d9e6f5 100%);
      padding: 24px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h2 {
      text-align: center;
      color: #1a3f60;
      font-weight: 700;

      letter-spacing: -0.3px;

      margin-bottom: 8px;
    }
    .subhead {
      text-align: center;

      text-align: center;

      font-family: monospace;
    }
    .fio-container {
      text-align: center;
      margin: 0 auto 32px auto;
      background: #ffffffdd;
      backdrop-filter: blur(4px);

    .fio-container input {

      padding: 10px 20px;

    #aCol {
      max-width: 1400px;

    .col-item {

    }
    .col-item label span {

      color: #0a2f44;
    }
    .col-item input {
      width: 80px;
      padding: 8px 6px;

      background: white;

    .col-item input:focus {

    }
    button, .menu-button {
      display: inline-block;
      margin: 10px 12px;
      padding: 14px 32px;
      font-size: 1.2rem;
      font-weight: bold;
      background: #1f6390;
      color: white;
      border: none;
      border-radius: 80px;
      cursor: pointer;
      transition: 0.2s;

    }

    }
    .menu-button:hover {

      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }
    button:hover {
      background: #0a4b70;
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }
    .action-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin: 20px auto 10px auto;
    }
    #results {
      margin: 30px auto;
      width: 95%;
      max-width: 1300px;
      background: #ffffffec;
      border-radius: 36px;
      padding: 24px 28px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
      border: 1px solid #d4e2f0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 24px;
      overflow: hidden;
      margin-top: 18px;
      font-size: 0.95rem;
    }
    th {
      background-color: #e3f0fa;
      color: #1a4c74;
      padding: 12px 8px;
      font-weight: 700;
    }
    td, th {
      border: 1px solid #cde0ef;
      padding: 10px 8px;
      vertical-align: middle;
    }
    .error, .server-response {
      max-width: 800px;
      margin: 20px auto;
      border-radius: 60px;
      padding: 14px 24px;
      font-weight: 500;
      text-align: center;
    }
    .error {
      background: #ffe8e6;
      color: #b12a1f;
      border-left: 6px solid #c0392b;
    }
    .server-response {
      background: #eaf6ff;
      border-left: 6px solid #2c7da0;
      color: #155f7c;
    }
    footer {
      text-align: center;
      font-size: 0.8rem;
      margin-top: 30px;
      color: #3d627c;
    }
    hr {
      margin: 16px 0;
    }
    @media (max-width: 880px) {
      .col-item li {
        flex-wrap: wrap;
        gap: 6px;
      }
      .col-item label span {
        min-width: 110px;
      }
      .fio-container input {
        width: 260px;
      }
      button, .menu-button {
        padding: 10px 24px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<h2>📐 Очень сложный Арифметический тест</h2>
<div style="text-align: center;"><span class="subhead">⚡ Решайте быстро и точно — время + правильность = оценка ⚡</span></div>

<div id="timer">⏱️ Время: 0 сек</div>

<div id="errorMessage" class="error" style="display: none;"></div>
<div id="serverResponse" class="server-response" style="display: none;"></div>

<form id="myForm" method="POST" action="save.php">
  <!-- скрытые служебные поля -->
  <input type="hidden" name="predmet" value="математика">
  <input type="hidden" name="tdate" id="tdate">
  <input type="hidden" name="nazv" value="Очень сложные уравнения">
  <input type="hidden" name="time" id="time_input" value="0">
  <input type="hidden" name="grade" id="grade_input" value="">

  <div class="fio-container">
    <label for="fio">📝 ФИО / Имя:</label>
    <input type="text" id="fio" name="fio" list="lift" autocomplete="off" placeholder="Выберите или введите имя" required>
    <datalist id="lift">
      <option>Егор</option>
      <option>Ксюша</option>
      <option>Анюта</option>
      <option>Даня</option>
    </datalist>
  </div>
  <div id="aCol">
    <div class="column-wrap">
      <!-- КОЛОНКА 1: вопросы 1–10 -->
      <div class="col-item">
        <ul>
          <li><label for="test1"><span>1. 63 - x = 60</span></label><input type="number" id="test1" name="test1" placeholder="?" autocomplete="off"></li>
          <li><label for="test2"><span>2. 42 + x = 54</span></label><input type="number" id="test2" name="test2" placeholder="?" autocomplete="off"></li>
          <li><label for="test3"><span>3. 12 * x = 48</span></label><input type="number" id="test3" name="test3" placeholder="?" autocomplete="off"></li>
          <li><label for="test4"><span>4. 56 / x = 8</span></label><input type="number" id="test4" name="test4" placeholder="?" autocomplete="off"></li>
          <li><label for="test5"><span>5. 81 - x = 52</span></label><input type="number" id="test5" name="test5" placeholder="?" autocomplete="off"></li>
          <li><label for="test6"><span>6. 34 + x = 101</span></label><input type="number" id="test6" name="test6" placeholder="?" autocomplete="off"></li>
          <li><label for="test7"><span>7. 15 * x = 45</span></label><input type="number" id="test7" name="test7" placeholder="?" autocomplete="off"></li>
          <li><label for="test8"><span>8. 72 / x = 9</span></label><input type="number" id="test8" name="test8" placeholder="?" autocomplete="off"></li>
          <li><label for="test9"><span>9. 56 + x = 93</span></label><input type="number" id="test9" name="test9" placeholder="?" autocomplete="off"></li>
          <li><label for="test10"><span>10. 124 - x = 49</span></label><input type="number" id="test10" name="test10" placeholder="?" autocomplete="off"></li>
        </ul>
      </div>

      <!-- КОЛОНКА 2: вопросы 11–20 -->
      <div class="col-item">
        <ul>
          <li><label for="test11"><span>11. x + 83 = 100</span></label><input type="number" id="test11" name="test11" placeholder="?" autocomplete="off"></li>
          <li><label for="test12"><span>12. 9 * x = 81</span></label><input type="number" id="test12" name="test12" placeholder="?" autocomplete="off"></li>
          <li><label for="test13"><span>13. x / 8 = 8</span></label><input type="number" id="test13" name="test13" placeholder="?" autocomplete="off"></li>
          <li><label for="test14"><span>14. 91 - x = 58</span></label><input type="number" id="test14" name="test14" placeholder="?" autocomplete="off"></li>
          <li><label for="test15"><span>15. 63 + x = 117</span></label><input type="number" id="test15" name="test15" placeholder="?" autocomplete="off"></li>
          <li><label for="test16"><span>16. 134 / x = 67</span></label><input type="number" id="test16" name="test16" placeholder="?" autocomplete="off"></li>
          <li><label for="test17"><span>17. x - 74 = 25</span></label><input type="number" id="test17" name="test17" placeholder="?" autocomplete="off"></li>
          <li><label for="test18"><span>18. 7 * x = 42</span></label><input type="number" id="test18" name="test18" placeholder="?" autocomplete="off"></li>
          <li><label for="test19"><span>19. x + 58 = 85</span></label><input type="number" id="test19" name="test19" placeholder="?" autocomplete="off"></li>
          <li><label for="test20"><span>20. 63 / x = 9</span></label><input type="number" id="test20" name="test20" placeholder="?" autocomplete="off"></li>
        </ul>
      </div>

      <!-- КОЛОНКА 3: вопросы 21–30 -->
      <div class="col-item">
        <ul>
          <li><label for="test21"><span>21. x + 45 = 78</span></label><input type="number" id="test21" name="test21" placeholder="?" autocomplete="off"></li>
          <li><label for="test22"><span>22. 150 - x = 72</span></label><input type="number" id="test22" name="test22" placeholder="?" autocomplete="off"></li>
          <li><label for="test23"><span>23. 8 * x = 64</span></label><input type="number" id="test23" name="test23" placeholder="?" autocomplete="off"></li>
          <li><label for="test24"><span>24. 99 / x = 11</span></label><input type="number" id="test24" name="test24" placeholder="?" autocomplete="off"></li>
          <li><label for="test25"><span>25. x - 28 = 45</span></label><input type="number" id="test25" name="test25" placeholder="?" autocomplete="off"></li>
          <li><label for="test26"><span>26. 37 + x = 100</span></label><input type="number" id="test26" name="test26" placeholder="?" autocomplete="off"></li>
          <li><label for="test27"><span>27. 5 * x = 60</span></label><input type="number" id="test27" name="test27" placeholder="?" autocomplete="off"></li>
          <li><label for="test28"><span>28. 144 / x = 12</span></label><input type="number" id="test28" name="test28" placeholder="?" autocomplete="off"></li>
          <li><label for="test29"><span>29. 88 - x = 39</span></label><input type="number" id="test29" name="test29" placeholder="?" autocomplete="off"></li>
          <li><label for="test30"><span>30. x + 19 = 56</span></label><input type="number" id="test30" name="test30" placeholder="?" autocomplete="off"></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button type="button" id="submitBtn">✅ Завершить тест ✅</button>
    <a href="index.html" class="menu-button">📋 Перейти в меню 📋</a>
    <!-- Исправленная ссылка: теперь это элемент с обработчиком JavaScript -->
    <a href="javascript:void(0);" class="menu-button" id="viewDataLink">🔍 Просмотр моих данных</a>
  </div>
</form>

<div id="results" style="display: none;"></div>

<footer>⭐ Таймер запущен автоматически. Нажмите «Завершить тест» — получите оценку и детали. Все 30 уравнений обязательны.</footer>

<script>
  // ========================= ПРАВИЛЬНЫЕ ОТВЕТЫ ДЛЯ 30 УРАВНЕНИЙ =========================
  const correctAnswersMap = {
    1: 3, 2: 12, 3: 4, 4: 7, 5: 29,
    6: 67, 7: 3, 8: 8, 9: 37, 10: 75,
    11: 17, 12: 9, 13: 64, 14: 33, 15: 54,
    16: 2, 17: 99, 18: 6, 19: 27, 20: 7,
    21: 33, 22: 78, 23: 8, 24: 9, 25: 73,
    26: 63, 27: 12, 28: 12, 29: 49, 30: 37
  };
  const TOTAL_QUESTIONS = 30;

  // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ТАЙМЕРА ----------
  let startTime = null;
  let timerInterval = null;
  let isTestFinished = false;

  // запуск таймера при загрузке
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    startTime = Date.now();
    timerInterval = setInterval(() => {
      if (isTestFinished) return;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const timerDiv = document.getElementById('timer');
      if (timerDiv) timerDiv.textContent = `⏱️ Время: ${elapsed} сек`;
    }, 200);
  }

  // остановка таймера и получение секунд
  function stopTimerAndGetSeconds() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    if (startTime) {
      return Math.floor((Date.now() - startTime) / 1000);
    }
    return 0;
  }

  // получить дату-время для скрытого поля
  function getCurrentDateTime() {
    const now = new Date();
    const Y = now.getFullYear();
    const M = String(now.getMonth() + 1).padStart(2, '0');
    const D = String(now.getDate()).padStart(2, '0');
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    return `${Y}-${M}-${D} ${h}:${m}:${s}`;
  }

  // защита от XSS
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // оценка всех ответов
  function evaluateAllAnswers() {
    let wrongCount = 0;
    let detailed = {};
    for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
      const inputEl = document.getElementById(`test${i}`);
      let userVal = 0;
      if (inputEl && inputEl.value !== '') {
        userVal = parseInt(inputEl.value, 10);
        if (isNaN(userVal)) userVal = 0;
      }
      const correctVal = correctAnswersMap[i];
      const isCorrect = (userVal === correctVal);
      if (!isCorrect) wrongCount++;

      // получаем текст вопроса из label span
      let questionText = `Вопрос ${i}`;
      const label = document.querySelector(`label[for="test${i}"]`);
      if (label) {
        const span = label.querySelector('span');
        if (span) questionText = span.textContent.trim();
      }
      detailed[questionText] = {
        userAnswer: userVal,
        correctAnswer: correctVal,
        isCorrect: isCorrect
      };
    }
    const correctCount = TOTAL_QUESTIONS - wrongCount;
    const percent = (correctCount / TOTAL_QUESTIONS) * 100;
    let grade = 2;
    if (percent >= 90) grade = 5;
    else if (percent >= 70) grade = 4;
    else if (percent >= 50) grade = 3;
    else grade = 2;
    return { wrongCount, correctCount, percent, grade, detailed };
  }

  // отображение таблицы с детальными результатами
  function renderResultsTable(fio, timeSec, correct, wrong, percent, grade, detailedMap) {
    let html = `
      <div style="font-family: inherit;">
        <h3>📊 РЕЗУЛЬТАТЫ ТЕСТА (30 примеров)</h3>
        <p><strong>👤 Участник:</strong> ${escapeHtml(fio)}</p>
        <p><strong>⏱️ Затраченное время:</strong> ${timeSec} секунд</p>
        <p><strong>✅ Правильных ответов:</strong> ${correct} из ${TOTAL_QUESTIONS}</p>
        <p><strong>❌ Ошибок:</strong> ${wrong}</p>
        <p><strong>📈 Процент верности:</strong> ${percent.toFixed(1)}%</p>
        <p><strong>🎓 ОЦЕНКА:</strong> <span style="font-size: 1.5rem; font-weight:800;">${grade}</span></p>
        <h4>📋 Детализация по каждому уравнению:</h4>
        <div style="overflow-x: auto;">
        <table style="min-width: 500px;">
          <thead>
            <tr><th>Уравнение</th><th>Ваш ответ</th><th>Правильный ответ</th><th>Результат</th>
          </thead>
          <tbody>
    `;
    for (const [question, data] of Object.entries(detailedMap)) {
      const color = data.isCorrect ? '#1f7a3b' : '#c0392b';
      const status = data.isCorrect ? '✔ Верно' : '✘ Ошибка';
      html += `<tr>
        <td style="font-weight:500;">${escapeHtml(question)}</td>
        <td style="text-align:center;">${data.userAnswer}</td>
        <td style="text-align:center;">${data.correctAnswer}</td>
        <td style="color:${color}; font-weight:bold;">${status}</td>
      </tr>`;
    }
    html += `</tbody>
           </table>
        </div>
      </div>`;
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = html;
    resultsDiv.style.display = 'block';
    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // отправка на сервер (save.php) через fetch, без перезагрузки — показываем только общее сообщение
  async function sendToServer(formData) {
    try {
      const response = await fetch('save.php', {
        method: 'POST',
        body: formData
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      
      const serverDiv = document.getElementById('serverResponse');
      serverDiv.innerHTML = `<strong>✅ Результаты успешно сохранены на сервере.</strong>`;
      serverDiv.style.display = 'block';
      
      setTimeout(() => {
        if (serverDiv) serverDiv.style.display = 'none';
      }, 5000);
    } catch (err) {
      console.warn('Ошибка отправки на save.php', err);
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.innerHTML = `⚠️ Не удалось отправить данные на сервер: ${escapeHtml(err.message)}.<br> Результаты сохранены локально, проверьте файл save.php или соединение.`;
      errorDiv.style.display = 'block';
      
      setTimeout(() => {
        if (errorDiv) errorDiv.style.display = 'none';
      }, 6000);
    }
  }

  // === ГЛАВНАЯ ФУНКЦИЯ ПРИ НАЖАТИИ НА ЗАВЕРШЕНИЕ ===
  let isProcessing = false;

  document.getElementById('submitBtn').addEventListener('click', async () => {
    if (isTestFinished || isProcessing) return;
    
    document.getElementById('errorMessage').style.display = 'none';
    document.getElementById('serverResponse').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    const fioInput = document.getElementById('fio');
    const userFio = fioInput.value.trim();
    if (!userFio) {
      const errDiv = document.getElementById('errorMessage');
      errDiv.textContent = '❗ Пожалуйста, введите ваше имя или выберите из списка!';
      errDiv.style.display = 'block';
      setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
      return;
    }

    // Останавливаем таймер
    const spentSeconds = stopTimerAndGetSeconds();
    isTestFinished = true;

    document.getElementById('time_input').value = spentSeconds;
    document.getElementById('tdate').value = getCurrentDateTime();

    const { wrongCount, correctCount, percent, grade, detailed } = evaluateAllAnswers();
    document.getElementById('grade_input').value = grade;

    renderResultsTable(userFio, spentSeconds, correctCount, wrongCount, percent, grade, detailed);

    const formElement = document.getElementById('myForm');
    const formData = new FormData(formElement);
    formData.set('fio', userFio);
    
    isProcessing = true;
    await sendToServer(formData);
    isProcessing = false;
  });

  // ========== ОБРАБОТЧИК ДЛЯ ССЫЛКИ "ПРОСМОТР МОИХ ДАННЫХ" ==========
  // Исправляем проблему: динамически формируем URL с текущим ФИО
  document.getElementById('viewDataLink').addEventListener('click', function(e) {
    e.preventDefault(); // дополнительная страховка
    const fioInput = document.getElementById('fio');
    const fioValue = fioInput.value.trim();
    if (!fioValue) {
      const errDiv = document.getElementById('errorMessage');
      errDiv.textContent = '❗ Пожалуйста, введите имя, чтобы просмотреть свои данные.';
      errDiv.style.display = 'block';
      setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
      return;
    }
    // Кодируем ФИО и переходим на show.php
    const encodedFio = encodeURIComponent(fioValue);
    window.location.href = `show.php?fio=${encodedFio}`;
  });

  // ========== АВТОЗАПУСК ТАЙМЕРА ПРИ ЗАГРУЗКЕ ==========
  function initPage() {
    startTimer();
    isTestFinished = false;
    if (!document.getElementById('tdate').value) {
      document.getElementById('tdate').value = getCurrentDateTime();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPage);
  } else {
    initPage();
  }

  // Защита от случайной отправки формы через Enter
  document.getElementById('myForm').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.type !== 'submit') {
      e.preventDefault();
    }
  });
</script>
</body>
</html>
