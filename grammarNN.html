// ========== Таймер ==========
let globalStartTime = Date.now();
let timerInterval;
let timerStopped = false;

function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
        if (!timerStopped) {
            const now = Date.now();
            const elapsed = Math.floor((now - globalStartTime) / 1000);
            document.getElementById('timer').textContent = `Время: ${elapsed} сек`;
        }
    }, 1000);
}

function stopTimer() {
    if (!timerStopped) {
        timerStopped = true;
        clearInterval(timerInterval);
        timerInterval = null;
    }
    return Math.floor((Date.now() - globalStartTime) / 1000);
}

// Текущая дата и время для поля tdate
function getCurrentDateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}

// ========== Функция отправки данных на сервер (save.php) ==========
async function sendFormData(form) {
    const formData = new FormData(form);
    try {
        const response = await fetch('save.php', {
            method: 'POST',
            body: formData
        });
        const text = await response.text();
        return { ok: response.ok, message: text };
    } catch (error) {
        return { ok: false, message: error.message };
    }
}

// ========== Обработчик завершения теста (нажатие на новую кнопку) ==========
document.getElementById('finishTestBtn').addEventListener('click', async function() {
    const form = document.getElementById('myForm');

    // Скрываем старые сообщения
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';
    document.getElementById('serverResponse').innerHTML = '';

    // Проверка ФИО
    const userFio = document.getElementById('fio').value.trim();
    if (!userFio) {
        errorDiv.textContent = 'Пожалуйста, введите ваше ФИО!';
        errorDiv.style.display = 'block';
        return;
    }

    // Собираем ответы пользователя и сверяем с эталоном
    let userAnswers = [];
    let correctCount = 0;
    const totalQuestions = 45;
    for (let i = 1; i <= totalQuestions; i++) {
        const answerElem = document.getElementById(`word${i}`);
        if (!answerElem) continue;
        const answer = answerElem.value.trim().toLowerCase();
        userAnswers.push(answer);
        if (answer === correctAnswers[i-1]) {
            correctCount++;
        }
    }
    const incorrectCount = totalQuestions - correctCount;

    // Вычисляем оценку
    const errorPercentage = (incorrectCount / totalQuestions) * 100;
    let finalGrade;
    if (errorPercentage < 30) finalGrade = 5;
    else if (errorPercentage < 50) finalGrade = 4;
    else if (errorPercentage < 70) finalGrade = 3;
    else finalGrade = 2;

    // Формируем HTML для модального окна (таблица результатов)
    let html = `<h3>Правильных ответов: ${correctCount} из ${totalQuestions}. Оценка: ${finalGrade}</h3>`;
    html += '<table id="resultsTable">';
    html += '<tr><th>Слово</th><th>Правильный ответ</th><th>Ваш ответ</th><th>Результат</th></tr>';
    for (let i = 0; i < correctAnswers.length; i++) {
        const isCorrect = userAnswers[i] === correctAnswers[i];
        html += `<tr>
            <td>${correctWord[i]}</td>
            <td>${correctAnswers[i]}</td>
            <td>${userAnswers[i] || '—'}</td>
            <td style="color: ${isCorrect ? 'green' : 'red'}">${isCorrect ? '✓ Верно' : '✗ Ошибка'}</td>
        </tr>`;
    }
    html += '</table>';
    document.getElementById('resultsContainer').innerHTML = html;
    document.getElementById('resultsModal').style.display = 'block';

    // Заполняем скрытые поля формы
    document.getElementById('tdate').value = getCurrentDateTime();
    document.getElementById('time_input').value = stopTimer();
    document.getElementById('grade_input').value = finalGrade;

    // Отправляем данные на сервер
    const serverResponseDiv = document.getElementById('serverResponse');
    serverResponseDiv.innerHTML = 'Сохраняем результаты...';

    const result = await sendFormData(form);
    if (result.ok) {
        serverResponseDiv.innerHTML = '<span class="success">✅ Результаты успешно сохранены на сервере.</span>';
    } else {
        serverResponseDiv.innerHTML = `<span class="error">❌ Ошибка при сохранении: ${result.message}</span>`;
    }
});
