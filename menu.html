<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Меню с подменю</title>
  <style>
    /* Сброс стандартных отступов */
    .simple-menu ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      background-color: #FF0000; /* красный фон меню */
    }

    /* Очистка float (вместо overflow: hidden, чтобы не скрывать выпадающее меню) */
    .simple-menu ul::after {
      content: "";
      display: table;
      clear: both;
    }

    /* Выравнивание основных пунктов меню в ряд */
    .simple-menu li {
      float: left;
      position: relative; /* Для позиционирования подменю */
    }

    /* Оформление ссылок */
    .simple-menu li a {
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
      font-family: Arial, sans-serif;
      transition: 0.3s; /* Плавный переход цвета */
    }

    /* Эффект при наведении на ссылку */
    .simple-menu li a:hover {
      background-color: #555;
      color: #ffcc00;
    }

    /* Стили для выпадающего подменю */
    .simple-menu .dropdown {
      display: none; /* Скрыто по умолчанию */
      position: absolute;
      top: 100%;      /* Появляется сразу под родительским пунктом */
      left: 0;
      background-color: #333;
      min-width: 180px; /* Минимальная ширина подменю */
      z-index: 1;
      padding: 0;
    }

    /* Элементы подменю располагаются вертикально */
    .simple-menu .dropdown li {
      float: none;
      width: 100%;
    }

    /* Ссылки подменю (выравнивание текста влево, другой отступ) */
    .simple-menu .dropdown li a {
      text-align: left;
      padding: 12px 16px;
    }

    /* Показываем подменю при наведении на родительский пункт */
    .simple-menu li:hover .dropdown {
      display: block;
    }
  </style>
</head>
<body>
  <nav class="simple-menu">
    <ul>
      <li><a href="#">Русский</a></li>
      <li>
        <a href="#">Математика</a>
        <!-- Выпадающее подменю -->
        <ul class="dropdown">
          <li><a href="matematik30.html"> 30 задач</a></li>
          <li><a href="matematikPlus.html"> сложение</a></li>
		  <li><a href="matematikMultiply.html">  умножение</a></li>
		   <li><a href="multiPlier.html"> найди множитель</a></li>
        </ul>
      </li>
      <li><a href="#">Литература</a></li>
      <li><a href="#">Окружающий мир</a></li>
    </ul>
  </nav>
</body>
</html>
